name: EAS Build & Distribute

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build & Upload to Firebase
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      # ubuntu-latest ships Java 17 — activate it without needing setup-java
      - run: echo "JAVA_HOME=$JAVA_HOME_17_X64" >> $GITHUB_ENV

      - run: npm ci

      - run: npm install -g eas-cli firebase-tools

      - name: Build APK (local — no EAS queue)
        run: eas build --platform android --profile preview --local --output TimeMatrix.apk --non-interactive

      - name: Upload to Firebase App Distribution
        run: |
          firebase appdistribution:distribute TimeMatrix.apk \
            --app ${{ secrets.FIREBASE_APP_ID }} \
            --release-notes "Build from ${{ github.ref_name }} @ $(echo ${{ github.sha }} | cut -c1-7)"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
