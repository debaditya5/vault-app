name: EAS Build

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Android APK (Preview)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        run: eas build --platform android --profile preview --non-interactive

      - name: Get build URL
        run: |
          BUILD_URL=$(eas build:list --platform android --status finished --limit 1 --json --non-interactive | jq -r '.[0].artifacts.buildUrl')
          echo "## Android Build Ready" >> $GITHUB_STEP_SUMMARY
          echo "Download APK: $BUILD_URL" >> $GITHUB_STEP_SUMMARY
